[package]
name = "x-nes"
authors = ["Nguyễn Quý Ngọc"]
version = "0.1.0"
edition = "2024"
rust-version = "1.97.0"
repository = "https://github.com/ChaoswareHQ/x-nes"
license = "MIT"

[lib]
name = "nes"
crate-type = ["cdylib", "staticlib"]

[dev-dependencies]
config = "0.15.25"
softbuffer = "0.4.8"
winit = "0.30.13"

[profile.dev]
panic = "abort"

[profile.release]
opt-level      = 3
lto            = true
codegen-units  = 1
strip          = "symbols"
panic          = "abort"
