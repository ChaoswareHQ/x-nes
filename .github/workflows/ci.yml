name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
          components: rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --check

      - name: Build
        run: cargo build --release

      - name: Clippy
        run: cargo clippy --release -- -D warnings

      - name: Run unit tests
        run: cargo test --lib --release

  tests:
    name: ROM accuracy tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Install system deps (for dev-dependencies)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libudev-dev libasound2-dev \
            libxkbcommon-dev libwayland-dev \
            libx11-dev libxcursor-dev libxrandr-dev libxi-dev

      - name: Run AccuracyCoin test
        run: cargo test --release --test accuracy_coin -- --nocapture 2>&1 | tee test_output.log

      - name: Extract AccuracyCoin grade
        id: grade
        run: |
          echo "=== ACCURACYCOIN GRADE ==="
          grep -A 10 "AccuracyCoin Test Summary" test_output.log || echo "Summary not found"
          echo ""

          PASS=$(grep -oP '^\s+\K\d+(?=\s+PASS)' test_output.log)
          TOTAL=$(grep -oP '^\s+\K\d+(?=\s+TOTAL)' test_output.log)
          if [ -n "$TOTAL" ] && [ "$TOTAL" -gt 0 ] 2>/dev/null; then
            PCT=$((PASS * 100 / TOTAL))
            echo "pass=$PASS" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "score=${PASS}/${TOTAL}" >> $GITHUB_OUTPUT
            echo "Computed: $PASS / $TOTAL = ${PCT}%"
            {
              echo "## AccuracyCoin Results"
              grep -A 10 "AccuracyCoin Test Summary" test_output.log
            } >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          else
            echo "pass=0" >> $GITHUB_OUTPUT
            echo "total=0" >> $GITHUB_OUTPUT
            echo "score=0/0" >> $GITHUB_OUTPUT
            echo "Could not compute score"
          fi

      - name: Update README badge with score
        if: github.ref == 'refs/heads/main' && steps.grade.outputs.score != '0/0'
        run: |
          SCORE="${{ steps.grade.outputs.score }}"
          echo "Updating README accuracy score to $SCORE"
          sed -i "s|passes \*\*[0-9]\{1,\}/[0-9]\{1,\}\*\*|passes **${SCORE}**|g" README.md
          grep -o "passes \*\*[0-9]\{1,\}/[0-9]\{1,\}\*\*" README.md || echo "Badge pattern not found"

      - name: Commit updated score
        if: github.ref == 'refs/heads/main' && steps.grade.outputs.score != '0/0'
        run: |
          if ! git diff --quiet README.md; then
            git config user.name "x-nes bot"
            git config user.email "bot@x-nes.dev"
            git add README.md
            git commit -m "Update accuracy to ${{ steps.grade.outputs.score }} [skip ci]"
            git push
            echo "README updated with new accuracy score"
          else
            echo "No change in accuracy score"
          fi

  book:
    name: Build and deploy book
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Cache mdbook
        id: cache-mdbook
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/mdbook
          key: ${{ runner.os }}-mdbook

      - name: Install mdbook
        if: steps.cache-mdbook.outputs.cache-hit != 'true'
        run: cargo install mdbook

      - name: Cache book build
        uses: actions/cache@v4
        with:
          path: docs/book
          key: ${{ runner.os }}-book-${{ hashFiles('docs/src/**') }}

      - name: Build book
        run: mdbook build docs/

      - name: Check for broken internal links
        run: |
          FAILED=0
          while IFS= read -r line; do
            FILE=$(echo "$line" | grep -oP '(?<=]\()\.?/?[^)]+\.md' || true)
            if [ -n "$FILE" ]; then
              FILE_PATH="docs/src/$FILE"
              if [ ! -f "$FILE_PATH" ]; then
                echo "MISSING: $FILE_PATH"
                FAILED=1
              fi
            fi
          done < docs/src/SUMMARY.md
          if [ "$FAILED" = "1" ]; then exit 1; fi
          echo "All referenced files exist"

      - name: Setup Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v4
